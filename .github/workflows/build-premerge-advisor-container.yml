name: Build Premerge Advisor Container

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-premerge-advisor-container.yml
      - 'premerge/advisor/**'
  pull_request:
    paths:
      - .github/workflows/build-premerge-advisor-container.yml
      - 'premerge/advisor/**'

jobs:
  build-premerge-advisor-container:
    if: github.repository_owner == 'llvm'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout LLVM Zorg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: premerge/advisor
      - name: Build Container
        uses: llvm/llvm-project/.github/actions/build-container@12e957fd7feb388b266fd71ab7960450df6884c1
        with:
          container-name: premerge-advisor
          context: premerge/advisor

  push-premerge-advisor-container:
    if: github.event_name == 'push'
    needs:
      - build-premerge-advisor-container
    permissions:
      packages: write
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: llvm/llvm-project/.github/actions/push-container@12e957fd7feb388b266fd71ab7960450df6884c1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}